<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lima Chamber of Commerce</title>
    <meta name="author" content="Gino Estrella">
    <meta name="description" content="The Lima Chamber of Commerce promotes business growth in the Peruvian capital, providing support and opportunities to companies from all sectors, to strengthen the business fabric of Lima and contribute to the progress of our community.">
    <link rel="icon" href="images/favicon_index.ico" type="image/x-icon">
    <meta property="og:title" content="Chamber of Commerce of Lima">
    <meta property="og:type" content="website">
    <meta property="og:image" content="#">
    <meta property="og:url" content="https://gino004.github.io/wdd230/">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/medium.css">
    <link rel="stylesheet" href="styles/larger.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="images/Wardiere.png" alt="Logo" style="border-radius: 50px; padding: 20px; height:150px;">
            <h3>The Lima Chamber of Commerce</h3>
        </div>
        <button id="hamburger_menu"></button>
        <nav class="navbar">
            <ul>
                <li>
                    <a>Home</a>
                </li>
                <li>
                    <a>Discover</a>
                </li>
                <li>
                    <a>Directory</a>
                </li>
                <li>
                    <a>Join</a>
                </li>
            </ul>
        </nav>
        <div id="mode">
            ☀️/🌑
        </div>
    </header>
    <div class="hero">
        <picture>
            <source media="(max-width: 715px)" srcset="images/small.webp">
            <source media="(max-width: 959px)" srcset="images/medium.webp">
            <img src="images/large.webp" alt="hero" width="1080" height="720">
        </picture>
    </div>
    <main>
        <!-- <div class="card01">
        </div>
        <div class="card02">
        </div> -->
        <div class="card03">
            <div class="weather">
                <h3>Weather</h3>
                <p>🌧️: <span id="temperature">50</span>°F Heavy rains</p>
                <p>Wind Speed: <span id="windspeed">20</span> mph</p>
                <p>Wind Chill: <span id="windchill">-</span></p>
            </div>
        </div>
    </main>
    <footer>
        <img src="images/Wardiere.png " alt="Logo" style="border-radius: 50px; padding: 20px ">
        <p>
            <span class="prf">The Lima Chamber of Commerce | Gino Estrella | WDD230 Proyect | Last updated:</span>
            <span id="lastupdated"></span>
        </p>
    </footer>
    <script src="scripts/index.js" defer></script>
    <script src="scripts/nav.js" defer></script>
    <script src="scripts/toggle.js" defer></script>
    <script src="scripts/windchill.js" defer></script>
</body>

</html>
